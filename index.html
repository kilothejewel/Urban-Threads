<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Threads | Streetwear</title>
  <meta name="description" content="Premium streetwear for young adults.">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header-wrapper">
    <header>
      <nav class="navbar">
        <div class="logo"><a href="index.html">Urban Threads</a></div>
        <div class="search-container">
          <input type="search" placeholder="Search Items, Brands & Categories">
        </div>
        <ul class="nav-actions">
          <li id="nav-item-login"><a href="login.html">Sign In</a> / <a href="register.html">Register</a></li>
          <li id="nav-item-logout" style="display:none;"><button id="btn-logout">Logout</button></li>
          <li id="nav-item-cart" style="display:none;"><a href="cart.html">Cart</a></li>
        </ul>
      </nav>
    </header>
    <ul class="secondary-nav">
      <li><a href="#">Mens</a></li>
      <li><a href="#">Ladies</a></li>
      <li><a href="#">Kids</a></li>
      <li><a href="#">Shoes</a></li>
      <li><a href="#">Everyday Basics</a></li>
      <li><a href="#" style="color: var(--accent-color);">Promos</a></li>
    </ul>
  </div>
  <div class="promo-banner">
    THIS MOTHER'S DAY... MOM WANTS NOTHING BUT SPOILS!
  </div>

  <section class="hero-category-grid">
    <div class="category-card">
      <img src="./assets/images/hero_ladies.png" alt="Ladies">
      <div class="category-overlay">ladies <span class="arrow">&gt;</span></div>
    </div>
    <div class="category-card">
      <img src="./assets/images/hero_mens.png" alt="Mens">
      <div class="category-overlay">mens <span class="arrow">&gt;</span></div>
    </div>
    <div class="category-card">
      <img src="./assets/images/hero_kids.png" alt="Kids">
      <div class="category-overlay">kids 7-14 <span class="arrow">&gt;</span></div>
    </div>
  </section>

  <main style="padding: 2rem;">
    <h1>Welcome to Urban Threads</h1>
    
    <!-- This is where we will inject our products dynamically! -->
    <div id="product-grid" class="product-grid">
      <p id="loading-text">Loading the latest drips...</p>
    </div>
  </main>

  <script type="module" src="./js/pages/main.js"></script>
</body>
</html>

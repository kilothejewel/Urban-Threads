<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Urban Threads</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header-wrapper">
    <header>
      <nav class="navbar">
        <div class="logo"><a href="index.html">Urban Threads</a></div>
        <div class="search-container">
          <input type="search" placeholder="Search Items, Brands & Categories">
        </div>
        <ul class="nav-actions">
          <li id="nav-item-login"><a href="login.html" style="color: var(--accent-color);">Sign In / Register</a></li>
          <li id="nav-item-logout" style="display:none;"><button id="btn-logout">Logout</button></li>
          <li id="nav-item-cart" style="display:none;"><a href="cart.html">Cart</a></li>
        </ul>
      </nav>
    </header>
    <ul class="secondary-nav">
      <li><a href="#">Mens</a></li>
      <li><a href="#">Ladies</a></li>
      <li><a href="#">Kids</a></li>
      <li><a href="#">Shoes</a></li>
      <li><a href="#">Everyday Basics</a></li>
      <li><a href="#" style="color: var(--accent-color);">Promos</a></li>
    </ul>
  </div>

  <main style="padding: 2rem; max-width: 400px; margin: auto;">
    <h1>Login to your account</h1>
    <form id="login-form" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
      <input type="email" id="email" placeholder="Email" required style="padding: 0.5rem;">
      <input type="password" id="password" placeholder="Password" required style="padding: 0.5rem;">
      <button type="submit" style="padding: 0.5rem; background: var(--primary-color); color: white; border: none; cursor: pointer;">Login</button>
    </form>
    <p id="error-message" style="color: red; margin-top: 1rem; display: none;"></p>
  </main>
  
  <script type="module" src="./js/pages/login.js"></script>
</body>
</html>

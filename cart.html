<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Urban Threads</title>
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header-wrapper">
    <header>
      <nav class="navbar">
        <div class="logo"><a href="index.html">Urban Threads</a></div>
        <div class="search-container">
          <input type="search" placeholder="Search Items, Brands & Categories">
        </div>
        <ul class="nav-actions">
          <li id="nav-item-login"><a href="login.html">Sign In</a> / <a href="register.html">Register</a></li>
          <li id="nav-item-logout" style="display:none;"><button id="btn-logout">Logout</button></li>
          <li id="nav-item-cart"><a href="cart.html" style="color: var(--accent-color);">Cart</a></li>
        </ul>
      </nav>
    </header>
    <ul class="secondary-nav">
      <li><a href="#">Mens</a></li>
      <li><a href="#">Ladies</a></li>
      <li><a href="#">Kids</a></li>
      <li><a href="#">Shoes</a></li>
      <li><a href="#">Everyday Basics</a></li>
      <li><a href="#" style="color: var(--accent-color);">Promos</a></li>
    </ul>
  </div>

  <main style="padding: 2rem;">
    <h1>Your Shopping Cart</h1>
    
    <div id="cart-items" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
      <!-- Items generated dynamically -->
    </div>

    <!-- Sprint 4: Payment Simulation -->
    <div id="checkout-section" style="display:none; margin-top:2rem; border-top: 2px solid #e5e7eb; padding-top:2rem;">
      <h2 style="font-weight: 800; font-size: 1.5rem; color: var(--primary-color);">Total: <span id="cart-total" style="color: var(--accent-color)">$0.00</span></h2>
      <p style="margin-bottom: 1rem; color: #666;">Enter payment details to emulate a transaction.</p>
      
      <form id="payment-form" style="display: flex; flex-direction: column; max-width: 400px; gap: 1rem;">
        <input type="text" placeholder="Full Name" required style="padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px;">
        <input type="text" placeholder="Card Number" required value="4242 4242 4242 4242" style="padding: 0.75rem; border: 1px solid #ddd; border-radius: 8px;">
        <button class="btn-primary" type="submit" style="background-color: #10b981; margin-top: 0.5rem;">Complete Purchase</button>
      </form>
    </div>
  </main>

  <script type="module" src="./js/pages/cart.js"></script>
</body>
</html>
